<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMC Room Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Syne+Mono&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

:root {
  --bg: #f4f1eb;
  --surface: #faf8f4;
  --border: #ddd9d0;
  --muted: #c8c3b8;
  --text-dim: #888078;
  --text: #3a3530;
  --text-bright: #1a1510;
  --ink: #2c2820;
  --accent: #c0392b;
  --accent2: #2c5f8a;

  /* instrument families */
  --piano:   #b8d4f0;
  --strings: #f0c8b8;
  --guitar:  #b8f0d4;
  --voice:   #f0e0b8;
  --winds:   #d4b8f0;
  --perc:    #f0b8d4;
  --ensemble:#f0d8a0;
  --other:   #d0d0d0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  min-height: 100vh;
}

/* ── UPLOAD SCREEN ── */
#uploadScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 0;
}
.upload-box {
  border: 2px dashed var(--muted);
  border-radius: 4px;
  padding: 60px 80px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  max-width: 480px;
  width: 90%;
}
.upload-box:hover, .upload-box.drag-over {
  border-color: var(--accent);
  background: #fff;
}
.upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.upload-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 8px;
}
.upload-sub {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}
.upload-sub strong { color: var(--text); }
#fileInput { display: none; }

.preload-note {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Syne Mono', monospace;
}
.preload-btn {
  background: none;
  border: none;
  color: var(--accent2);
  cursor: pointer;
  font-family: 'Syne Mono', monospace;
  font-size: 11px;
  text-decoration: underline;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: #e8e4dc;
  padding: 16px 28px;
  display: flex;
  align-items: baseline;
  gap: 20px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 3px solid var(--accent);
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
}
.week-label {
  font-family: 'Syne Mono', monospace;
  font-size: 11px;
  color: #888;
  letter-spacing: 0.06em;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.reload-btn {
  font-family: 'Syne Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border: 1px solid #555;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  letter-spacing: 0.05em;
  border-radius: 2px;
  transition: all 0.15s;
}
.reload-btn:hover { border-color: var(--accent); color: #eee; }

/* ── SITE TABS ── */
.site-tabs {
  display: flex;
  background: #232018;
  padding: 0 28px;
  border-bottom: 1px solid #3a3530;
}
.site-tab {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 10px 18px;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #666;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.site-tab.active { color: #f4f1eb; border-bottom-color: var(--accent); }
.site-tab:hover:not(.active) { color: #aaa; }

/* ── DAY TABS ── */
.day-tabs {
  display: flex;
  gap: 0;
  padding: 12px 28px 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.day-tab {
  font-family: 'Syne Mono', monospace;
  font-size: 11px;
  padding: 7px 16px;
  cursor: pointer;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-bottom: none;
  background: var(--bg);
  margin-right: 3px;
  border-radius: 3px 3px 0 0;
  transition: all 0.12s;
  white-space: nowrap;
}
.day-tab.active {
  background: var(--surface);
  color: var(--text-bright);
  border-color: var(--border);
  border-bottom: 2px solid var(--surface);
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.day-tab:hover:not(.active) { background: var(--surface); color: var(--text); }
.day-tab .count {
  font-size: 9px;
  opacity: 0.6;
  margin-left: 4px;
}

/* ── MAIN GRID AREA ── */
#app { display: none; }
#app.ready { display: block; }

.grid-container {
  overflow: auto;
  max-height: calc(100vh - 140px);
  background: var(--bg);
}

/* ── ROOM GRID ── */
.room-grid {
  display: grid;
  /* columns set dynamically */
  min-width: max-content;
}

/* Time gutter */
.time-gutter {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--bg);
}

/* Room header row */
.room-headers {
  display: contents;
}
.room-header-cell {
  background: var(--surface);
  border-right: 1px solid var(--border);
  border-bottom: 2px solid var(--border);
  padding: 8px 10px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 0.03em;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 5;
}
.room-header-cell.time-header {
  left: 0;
  z-index: 15;
  background: var(--ink);
  color: #888;
  font-size: 10px;
  letter-spacing: 0.08em;
  border-bottom-color: var(--accent);
}

/* Time labels */
.time-label-cell {
  position: sticky;
  left: 0;
  z-index: 4;
  background: var(--bg);
  border-right: 2px solid var(--border);
  text-align: right;
  padding: 0 8px;
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.04em;
  vertical-align: top;
  padding-top: 3px;
  white-space: nowrap;
}

/* Room body cells */
.room-cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid rgba(0,0,0,0.04);
  position: relative;
  background: var(--surface);
}
.room-cell:nth-child(even) {
  background: #f8f6f1;
}
.room-cell.half-hour {
  border-bottom: 1px dashed var(--border);
}
.room-cell.full-hour {
  border-bottom: 1px solid var(--border);
}

/* ── EVENT BLOCKS ── */
.event-block {
  position: absolute;
  left: 2px;
  right: 2px;
  border-radius: 3px;
  padding: 3px 5px;
  overflow: hidden;
  cursor: pointer;
  transition: filter 0.1s, box-shadow 0.1s;
  border-left: 3px solid;
  z-index: 2;
}
.event-block:hover {
  filter: brightness(0.92);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 20;
}
.event-block.is-class {
  border-left-style: solid;
  border-left-width: 4px;
}
.eb-instrument {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: rgba(0,0,0,0.8);
  line-height: 1.25;
}
.eb-person {
  font-size: 9px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: rgba(0,0,0,0.55);
  margin-top: 1px;
}
.eb-time {
  font-family: 'Syne Mono', monospace;
  font-size: 8px;
  color: rgba(0,0,0,0.4);
  margin-top: 1px;
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  background: var(--ink);
  border: 1px solid #3a3530;
  border-radius: 4px;
  padding: 10px 14px;
  pointer-events: none;
  z-index: 1000;
  max-width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  display: none;
}
#tooltip.show { display: block; }
.tt-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f0ece4;
  margin-bottom: 7px;
}
.tt-row {
  display: flex;
  gap: 8px;
  margin-bottom: 3px;
  font-size: 11px;
}
.tt-label {
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #555;
  min-width: 62px;
  padding-top: 1px;
}
.tt-val { color: #aaa8a0; }

/* ── EMPTY STATE ── */
.empty-day {
  padding: 48px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  color: var(--muted);
  font-size: 14px;
}

/* ── LEGEND ── */
.legend-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 8px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text-dim);
}
.leg-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.leg-class-note {
  margin-left: 8px;
  padding-left: 10px;
  border-left: 1px solid var(--border);
  font-family: 'Syne Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.leg-class-swatch {
  width: 14px; height: 10px;
  border-left: 4px solid #888;
  background: #e8e4dc;
  border-radius: 1px;
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* ── PRINT ── */
#printSection { display: none; }

@media print {
  @page { size: landscape; margin: 10mm 8mm; }

  body { background: #fff; font-size: 10px; }

  /* hide everything interactive */
  #uploadScreen, #app { display: none !important; }
  #tooltip { display: none !important; }

  /* show print section */
  #printSection { display: block !important; }

  .print-page {
    page-break-after: always;
    break-after: page;
    width: 100%;
    overflow: hidden;
  }
  .print-page:last-child { page-break-after: avoid; break-after: avoid; }

  .print-page-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
    border-bottom: 2px solid #2c2820;
    padding-bottom: 5px;
  }
  .print-logo {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #1a1510;
  }
  .print-day-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #c0392b;
  }
  .print-meta {
    font-family: 'Syne Mono', monospace;
    font-size: 9px;
    color: #888;
    letter-spacing: 0.06em;
    margin-left: auto;
  }

  .print-grid-wrap {
    width: 100%;
    overflow: hidden;
  }

  .print-grid {
    display: flex;
    width: 100%;
  }

  .print-time-col {
    flex-shrink: 0;
    width: 44px;
    border-right: 2px solid #2c2820;
  }
  .print-time-hdr {
    height: 22px;
    background: #2c2820;
    color: #888;
    font-family: 'Syne Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 5px;
    border-bottom: 2px solid #c0392b;
  }
  .print-time-lbl {
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding-right: 5px;
    padding-top: 1px;
    font-family: 'Syne Mono', monospace;
    font-size: 7px;
    color: #999;
    box-sizing: border-box;
  }

  .print-room-col {
    flex: 1;
    min-width: 0;
    position: relative;
    border-right: 1px solid #ddd9d0;
  }
  .print-room-hdr {
    height: 22px;
    background: #faf8f4;
    border-bottom: 2px solid #ddd9d0;
    padding: 0 4px;
    display: flex;
    align-items: center;
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    font-weight: 600;
    color: #1a1510;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .print-room-body {
    position: relative;
  }
  .print-hour-line {
    position: absolute;
    left: 0; right: 0;
    box-sizing: border-box;
  }
  .print-event {
    position: absolute;
    left: 1px; right: 1px;
    border-radius: 2px;
    padding: 1px 3px;
    overflow: hidden;
    border-left: 2px solid;
    box-sizing: border-box;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .print-event-title {
    font-family: 'Syne', sans-serif;
    font-size: 7px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(0,0,0,0.82);
    line-height: 1.2;
  }
  .print-event-person {
    font-size: 6.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(0,0,0,0.5);
    line-height: 1.2;
  }

  .print-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 5px;
    padding-top: 4px;
    border-top: 1px solid #ddd;
  }
  .print-leg-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 7px;
    color: #666;
  }
  .print-leg-dot {
    width: 8px; height: 8px;
    border-radius: 1px;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
</style>
</head>
<body>

<!-- Upload screen -->
<div id="uploadScreen">
  <div class="upload-box" id="dropZone">
    <div class="upload-icon">🎵</div>
    <div class="upload-title">CMC Schedule Viewer</div>
    <div class="upload-sub">
      Drop your <strong>RadGridExport.xls</strong> file here,<br>
      or click to browse. Works with any week's export.
    </div>
    <input type="file" id="fileInput" accept=".xls,.xlsx,.html,.htm">
  </div>
  <div class="preload-note">
    Have sample data? 
    <button class="preload-btn" id="useSampleBtn">Use loaded data →</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div>
      <div class="logo">CMC Room Schedule</div>
      <div class="week-label" id="weekLabel">—</div>
    </div>
    <div class="header-right">
      <button class="reload-btn" id="printBtn">⎙ Print all days</button>
      <button class="reload-btn" id="reloadBtn">↑ Load new file</button>
    </div>
  </header>

  <div class="site-tabs" id="siteTabs"></div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="legend-bar" id="legendBar"></div>

  <div class="grid-container" id="gridContainer">
    <div class="empty-day">Loading…</div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="ttTitle"></div>
  <div id="ttBody"></div>
</div>

<!-- Print-only section, built on demand -->
<div id="printSection"></div>

<script>
// ── COLOR FAMILIES ──────────────────────────────────────────────────────────
const FAM_MAP = {
  'Piano':['Piano','Harpsichord','Organ','Accordion','Introduction to Piano I','Introduction to Piano I for Adults','Introduction to Piano II','Introduction to Piano II for Adults','Introduction to Piano III for Adults'],
  'Strings':['Violin','Viola','Cello','Bass','Double Bass','Fiddle','Ukulele for Beginners for Adults','String Orchestra Workshop II','Strings Ensemble II: Sinfonia','Chamber Music Ensemble','Intro to Chamber Music'],
  'Guitar':['Guitar','Bass - Electric','Classical Guitar','Beginning Group Guitar for Adults','Guitar Ensemble','Guitar Group Class - Learning Songs','Guitar Orchestra I','Introduction to Guitar I (Ages 8–12)','Banjo','Mandolin'],
  'Voice & Choir':['Voice','Beginning Voice','CMC A Capella',"Children's Chorus",'Anything Goes Chorus I','Anything Goes Chorus II','Coro de Cámara','New Voices Bay Area TIGQ Chorus','Neighborhood Choirs for Older Adults and Adults with Disabilities','Vocal Harmony Part I','Vocal Harmony Part II','Intro to Musical Theater','Great Songs of Soul and R&B','Group Singing: The Power of Duets, Trios, & More'],
  'Winds & Brass':['Flute','Clarinet','Saxophone','Oboe','Bassoon','Trumpet','Trombone','French Horn','Euphonium','Tuba','Recorder'],
  'Percussion':['Drum Set','Marimba','Cajon','Afro-Peruvian Cajon','Brazilian Candomblé Drumming','Percussion'],
  'Ensemble & Jazz':['Advanced Jazz Ensemble','Beginning Jazz Ensemble','Intermediate Jazz Ensemble','Contemporary Jazz Ensemble: Jazz Today','Teen Jazz Orchestra','Mariachi CMC','Son Jarocho Music','Cuban Charanga Ensemble I','Cuban Charanga Ensemble II','Latin Jazz Ensemble','Blues Workshop','Rock & Pop Band','Girls Rock & Pop Band','Jazz Improv Workshop','Jazz Manouche Ensemble','Standards Ensemble I: The Great American Songbook','Standards Ensemble II: The Jazz Composers','Old Time & Bluegrass Jam','Young Musicians Program (YMP)','Young Musicians Program / Saturday Play! (Ensemble)','Mission District Young Musicians Program (MDYMP)','Mission District Young Musicians Program / Saturday Play!','Saturday Play! (Youth Latin Music Program)','Saturday Play! (Youth Music Program)','Music for Children'],
};
const FAM_COLORS = {
  'Piano': { bg: '#b8d4f0', border: '#4a90d9' },
  'Strings': { bg: '#f0c8b8', border: '#d96a38' },
  'Guitar': { bg: '#b8f0d4', border: '#38a870' },
  'Voice & Choir': { bg: '#f0e0b8', border: '#d9a030' },
  'Winds & Brass': { bg: '#d4b8f0', border: '#8850d0' },
  'Percussion': { bg: '#f0b8d4', border: '#d84080' },
  'Ensemble & Jazz': { bg: '#f0d8a0', border: '#c08020' },
  'Other': { bg: '#ddd9d0', border: '#888078' },
};

function getFam(item) {
  for (const [name, items] of Object.entries(FAM_MAP)) {
    if (items.includes(item)) return name;
  }
  return 'Other';
}
function getColor(item) { return FAM_COLORS[getFam(item)] || FAM_COLORS['Other']; }

// ── TIME UTILS ───────────────────────────────────────────────────────────────
function parseTime(t) {
  if (!t) return 0;
  t = t.trim();
  const m = t.match(/(\d+):(\d+)(?::(\d+))?\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]);
  const mn = parseInt(m[2]);
  const ap = m[4].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function fmtMin(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const ap = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return m === 0 ? `${h12} ${ap}` : `${h12}:${m.toString().padStart(2,'0')} ${ap}`;
}

// ── PARSE XLS (actually HTML) ─────────────────────────────────────────────────
function parseXLS(text) {
  const rows = [];
  const trRe = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
  let trMatch;
  while ((trMatch = trRe.exec(text)) !== null) {
    const cells = [];
    const tdRe = /<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi;
    let tdMatch;
    while ((tdMatch = tdRe.exec(trMatch[1])) !== null) {
      const raw = tdMatch[1].replace(/<[^>]+>/g, '').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').trim();
      cells.push(raw);
    }
    if (cells.length >= 11) rows.push(cells);
  }

  // First row is header
  if (rows.length < 2) return [];
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const c = rows[i];
    data.push({
      date: c[0], item: c[1], from: c[2], to: c[3],
      day: c[4], duration: c[5] || '30',
      facility: c[6], site: c[7], instructor: c[8],
      student: c[9]?.trim() || '', type: c[10]
    });
  }
  return data;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let ALL_DATA = [];
let SITES = [];
let currentSite = '';
let currentDay = '';

const DAYS_ORDER = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const DAYS_FULL = {Su:'Sun',Mo:'Mon',Tu:'Tue',We:'Wed',Th:'Thu',Fr:'Fri',Sa:'Sat'};

// ── LOAD DATA ────────────────────────────────────────────────────────────────
function loadData(data) {
  ALL_DATA = data;

  // Derive week label from dates
  const dates = [...new Set(data.map(r => r.date))].sort();
  if (dates.length > 0) {
    document.getElementById('weekLabel').textContent = `Week of ${dates[0]} – ${dates[dates.length-1]}`;
  }

  SITES = [...new Set(data.map(r => r.site))].sort();
  currentSite = SITES[0];

  renderSiteTabs();
  renderDayTabs();
  renderLegend();
  renderGrid();

  document.getElementById('app').classList.add('ready');
  document.getElementById('uploadScreen').style.display = 'none';
}

// ── FILTERED DATA ────────────────────────────────────────────────────────────
function forSiteDay() {
  return ALL_DATA.filter(r => r.site === currentSite && r.day === currentDay)
    .sort((a, b) => parseTime(a.from) - parseTime(b.from));
}

// ── RENDER SITE TABS ─────────────────────────────────────────────────────────
function renderSiteTabs() {
  const el = document.getElementById('siteTabs');
  el.innerHTML = '';
  SITES.forEach(site => {
    const tab = document.createElement('div');
    tab.className = 'site-tab' + (site === currentSite ? ' active' : '');
    // Shorten name
    tab.textContent = site.replace(' Branch', '');
    tab.addEventListener('click', () => {
      currentSite = site;
      document.querySelectorAll('.site-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderDayTabs();
      renderGrid();
    });
    el.appendChild(tab);
  });
}

// ── RENDER DAY TABS ──────────────────────────────────────────────────────────
function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = '';

  const daysWithData = DAYS_ORDER.filter(day =>
    ALL_DATA.some(r => r.site === currentSite && r.day === day)
  );

  if (!daysWithData.includes(currentDay)) currentDay = daysWithData[0];

  daysWithData.forEach(day => {
    const count = ALL_DATA.filter(r => r.site === currentSite && r.day === day).length;
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (day === currentDay ? ' active' : '');
    tab.innerHTML = `${DAYS_FULL[day]}<span class="count">${count}</span>`;
    tab.addEventListener('click', () => {
      currentDay = day;
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

// ── RENDER LEGEND ────────────────────────────────────────────────────────────
function renderLegend() {
  const el = document.getElementById('legendBar');
  el.innerHTML = Object.entries(FAM_COLORS).map(([name, c]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.bg};border:1.5px solid ${c.border}"></div>${name}</div>`
  ).join('') +
  `<div class="leg-class-note"><div class="leg-class-swatch"></div><span>thick border = group class</span></div>`;
}

// ── RENDER GRID ──────────────────────────────────────────────────────────────
function renderGrid() {
  const container = document.getElementById('gridContainer');
  const events = forSiteDay();

  if (events.length === 0) {
    container.innerHTML = `<div class="empty-day">No events for this day at this location.</div>`;
    return;
  }

  // Get rooms sorted alphabetically
  const rooms = [...new Set(events.map(r => r.facility))].sort();

  // Compute time range for this day (round to nearest 30min, add padding)
  const starts = events.map(e => parseTime(e.from));
  const ends = events.map(e => parseTime(e.to));
  const minT = Math.floor(Math.min(...starts) / 30) * 30;
  const maxT = Math.ceil(Math.max(...ends) / 30) * 30;

  const SLOT = 15; // minutes per row
  const PX = 28;   // pixels per slot row
  const TIME_W = 56;
  const ROOM_W = 140;

  // Build grid
  const numSlots = (maxT - minT) / SLOT;
  const numCols = 1 + rooms.length; // time col + rooms

  const grid = document.createElement('div');
  grid.className = 'room-grid';
  grid.style.gridTemplateColumns = `${TIME_W}px` + rooms.map(() => `${ROOM_W}px`).join(' ');

  // Header row: time + room names
  const timeHeader = document.createElement('div');
  timeHeader.className = 'room-header-cell time-header';
  timeHeader.textContent = 'TIME';
  grid.appendChild(timeHeader);

  rooms.forEach(room => {
    const rh = document.createElement('div');
    rh.className = 'room-header-cell';
    // Shorten room name: strip leading (XX) code if present
    rh.textContent = room.replace(/^\(\w+\)\s*/, '').trim() || room;
    rh.title = room;
    grid.appendChild(rh);
  });

  // One row per SLOT minutes
  // We need relative positioning within each room column for events
  // Strategy: render time labels, then use absolute positioning for events within a tall room div

  // Render time labels column and room columns as single rows (for hour lines)
  for (let s = 0; s < numSlots; s++) {
    const t = minT + s * SLOT;
    const isHour = t % 60 === 0;
    const isHalfHour = t % 60 === 30;

    // Time label
    const tl = document.createElement('div');
    tl.className = 'time-label-cell';
    tl.style.height = `${PX}px`;
    if (isHour) tl.textContent = fmtMin(t);
    tl.style.borderBottom = isHour ? '1px solid var(--border)' : isHalfHour ? '1px dashed var(--border)' : 'none';
    grid.appendChild(tl);

    rooms.forEach(room => {
      const cell = document.createElement('div');
      cell.style.height = `${PX}px`;
      cell.style.borderRight = '1px solid var(--border)';
      cell.style.position = 'relative';
      cell.style.background = s % 2 === 0 ? 'var(--surface)' : '#f0ede6';
      if (isHour) cell.style.borderBottom = '1px solid var(--border)';
      else if (isHalfHour) cell.style.borderBottom = '1px dashed rgba(0,0,0,0.06)';
      grid.appendChild(cell);
    });
  }

  // Now overlay events using absolute positioning
  // We'll use a wrapper approach: replace room columns with position:relative containers
  // Actually — simpler: we'll create a separate overlay layer per room

  // Rebuild: use a wrapper div per room that spans full height
  // Let's use a different DOM strategy: a single relative container with absolute event blocks

  // Actually, let's just use the grid but create event blocks positioned absolutely
  // within the grid itself, using grid-row/column placement.

  // We'll add events as absolutely positioned children of a full-height container.
  // Clear what we built and switch to a fixed-layout approach:

  container.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.style.display = 'flex';
  wrapper.style.minWidth = `${TIME_W + rooms.length * ROOM_W}px`;

  // Time column (sticky left)
  const timeColDiv = document.createElement('div');
  timeColDiv.style.width = `${TIME_W}px`;
  timeColDiv.style.flexShrink = '0';
  timeColDiv.style.position = 'sticky';
  timeColDiv.style.left = '0';
  timeColDiv.style.zIndex = '10';
  timeColDiv.style.background = 'var(--bg)';
  timeColDiv.style.borderRight = '2px solid var(--border)';

  // Header cell for time col
  const timeHdr = document.createElement('div');
  timeHdr.style.height = '36px';
  timeHdr.style.background = 'var(--ink)';
  timeHdr.style.color = '#666';
  timeHdr.style.fontFamily = "'Syne Mono', monospace";
  timeHdr.style.fontSize = '9px';
  timeHdr.style.letterSpacing = '0.08em';
  timeHdr.style.display = 'flex';
  timeHdr.style.alignItems = 'center';
  timeHdr.style.justifyContent = 'flex-end';
  timeHdr.style.paddingRight = '8px';
  timeHdr.style.borderBottom = `3px solid var(--accent)`;
  timeHdr.style.position = 'sticky';
  timeHdr.style.top = '0';
  timeHdr.style.zIndex = '20';
  timeHdr.textContent = 'TIME';
  timeColDiv.appendChild(timeHdr);

  for (let s = 0; s < numSlots; s++) {
    const t = minT + s * SLOT;
    const isHour = t % 60 === 0;
    const isHalf = t % 60 === 30;
    const lbl = document.createElement('div');
    lbl.style.height = `${PX}px`;
    lbl.style.display = 'flex';
    lbl.style.alignItems = 'flex-start';
    lbl.style.justifyContent = 'flex-end';
    lbl.style.paddingRight = '8px';
    lbl.style.paddingTop = '2px';
    lbl.style.fontFamily = "'Syne Mono', monospace";
    lbl.style.fontSize = '9px';
    lbl.style.color = 'var(--muted)';
    lbl.style.letterSpacing = '0.04em';
    lbl.style.boxSizing = 'border-box';
    lbl.style.borderBottom = isHour ? '1px solid var(--border)' : isHalf ? '1px dashed rgba(0,0,0,0.08)' : 'none';
    if (isHour) lbl.textContent = fmtMin(t);
    timeColDiv.appendChild(lbl);
  }
  wrapper.appendChild(timeColDiv);

  // Room columns
  const totalHeight = numSlots * PX;

  rooms.forEach(room => {
    const roomEvents = events.filter(e => e.facility === room);

    const col = document.createElement('div');
    col.style.width = `${ROOM_W}px`;
    col.style.flexShrink = '0';
    col.style.position = 'relative';

    // Room header
    const rHdr = document.createElement('div');
    rHdr.style.height = '36px';
    rHdr.style.background = 'var(--surface)';
    rHdr.style.borderRight = '1px solid var(--border)';
    rHdr.style.borderBottom = '2px solid var(--border)';
    rHdr.style.padding = '0 8px';
    rHdr.style.display = 'flex';
    rHdr.style.alignItems = 'center';
    rHdr.style.fontFamily = "'Syne', sans-serif";
    rHdr.style.fontSize = '10px';
    rHdr.style.fontWeight = '600';
    rHdr.style.color = 'var(--text-bright)';
    rHdr.style.letterSpacing = '0.03em';
    rHdr.style.position = 'sticky';
    rHdr.style.top = '0';
    rHdr.style.zIndex = '5';
    rHdr.style.boxSizing = 'border-box';
    rHdr.textContent = room.replace(/^\(\w+\)\s*/, '').trim() || room;
    rHdr.title = room;
    col.appendChild(rHdr);

    // Body
    const body = document.createElement('div');
    body.style.position = 'relative';
    body.style.height = `${totalHeight}px`;
    body.style.borderRight = '1px solid var(--border)';

    // Hour/half-hour lines
    for (let s = 0; s < numSlots; s++) {
      const t = minT + s * SLOT;
      const isHour = t % 60 === 0;
      const isHalf = t % 60 === 30;
      const line = document.createElement('div');
      line.style.position = 'absolute';
      line.style.top = `${s * PX}px`;
      line.style.left = '0'; line.style.right = '0';
      line.style.height = `${PX}px`;
      line.style.background = s % 4 < 2 ? 'var(--surface)' : '#eeebe3';
      if (isHour) line.style.borderTop = '1px solid var(--border)';
      else if (isHalf) line.style.borderTop = '1px dashed rgba(0,0,0,0.06)';
      body.appendChild(line);
    }

    // Event blocks
    roomEvents.forEach(ev => {
      const evStart = parseTime(ev.from);
      const evEnd = parseTime(ev.to);
      if (evEnd <= minT || evStart >= maxT) return;

      const top = (evStart - minT) / SLOT * PX;
      const height = Math.max((evEnd - evStart) / SLOT * PX - 2, 18);
      const col2 = getColor(ev.item);
      const isClass = ev.type === 'CLASS';

      const block = document.createElement('div');
      block.className = 'event-block' + (isClass ? ' is-class' : '');
      block.style.top = `${top}px`;
      block.style.height = `${height}px`;
      block.style.background = col2.bg;
      block.style.borderLeftColor = col2.border;
      if (isClass) block.style.borderLeftWidth = '4px';

      const instrLast = ev.instructor?.split(',')[0] || '';
      block.innerHTML = `<div class="eb-instrument">${ev.item}</div>` +
        (height > 28 && instrLast ? `<div class="eb-person">${instrLast}</div>` : '') +
        (height > 40 && ev.student ? `<div class="eb-person">${ev.student}</div>` : '') +
        (height > 54 ? `<div class="eb-time">${ev.from.replace(/^0/,'')} – ${ev.to.replace(/^0/,'')}</div>` : '');

      block.addEventListener('mouseenter', (e) => showTip(e, ev));
      block.addEventListener('mouseleave', hideTip);
      body.appendChild(block);
    });

    col.appendChild(body);
    wrapper.appendChild(col);
  });

  container.appendChild(wrapper);
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');

function showTip(e, ev) {
  document.getElementById('ttTitle').textContent = ev.item;
  document.getElementById('ttTitle').style.color = getColor(ev.item).border;
  const rows = [
    ['Time', `${ev.from.replace(/^0/,'')} – ${ev.to.replace(/^0/,'')} (${ev.duration} min)`],
    ['Type', ev.type],
    ['Instructor', ev.instructor || '—'],
    ev.type === 'LESSON' ? ['Student', ev.student || '—'] : null,
    ['Room', ev.facility],
    ['Site', ev.site],
  ].filter(Boolean);
  document.getElementById('ttBody').innerHTML = rows.map(([l,v]) =>
    `<div class="tt-row"><span class="tt-label">${l}</span><span class="tt-val">${v}</span></div>`
  ).join('');
  tip.classList.add('show');
  moveTip(e);
}

function moveTip(e) {
  const w = tip.offsetWidth || 260, h = tip.offsetHeight || 130;
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + w > window.innerWidth - 12) x = e.clientX - w - 10;
  if (y + h > window.innerHeight - 12) y = window.innerHeight - h - 12;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTip() { tip.classList.remove('show'); }
document.addEventListener('mousemove', e => { if (tip.classList.contains('show')) moveTip(e); });

// ── FILE UPLOAD ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) readFile(fileInput.files[0]);
});
document.getElementById('reloadBtn').addEventListener('click', () => {
  document.getElementById('uploadScreen').style.display = 'flex';
  document.getElementById('app').classList.remove('ready');
  fileInput.value = '';
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const data = parseXLS(text);
    if (data.length === 0) {
      alert('Could not parse schedule data from this file. Make sure it\'s a RadGrid export (.xls).');
      return;
    }
    loadData(data);
  };
  reader.readAsText(file, 'utf-8');
}

// ── PRINT ────────────────────────────────────────────────────────────────────
function buildPrintSection() {
  const section = document.getElementById('printSection');
  section.innerHTML = '';

  const SLOT = 15;
  const PX = 18; // smaller px per slot for print density
  const TIME_W = 44;

  // For each site, for each day that has data, build a page
  SITES.forEach(site => {
    const daysWithData = DAYS_ORDER.filter(day =>
      ALL_DATA.some(r => r.site === site && r.day === day)
    );

    const DAYS_LONG = {Su:'Sunday',Mo:'Monday',Tu:'Tuesday',We:'Wednesday',Th:'Thursday',Fr:'Friday',Sa:'Saturday'};

    daysWithData.forEach(day => {
      const events = ALL_DATA.filter(r => r.site === site && r.day === day)
        .sort((a,b) => parseTime(a.from) - parseTime(b.from));
      if (events.length === 0) return;

      const rooms = [...new Set(events.map(r => r.facility))].sort();
      const starts = events.map(e => parseTime(e.from));
      const ends = events.map(e => parseTime(e.to));
      const minT = Math.floor(Math.min(...starts) / 30) * 30;
      const maxT = Math.ceil(Math.max(...ends) / 30) * 30;
      const numSlots = (maxT - minT) / SLOT;
      const totalHeight = numSlots * PX;

      const page = document.createElement('div');
      page.className = 'print-page';

      // Page header
      const hdr = document.createElement('div');
      hdr.className = 'print-page-header';
      hdr.innerHTML = `
        <span class="print-logo">CMC</span>
        <span class="print-day-title">${DAYS_LONG[day]}</span>
        <span style="font-family:'Syne',sans-serif;font-size:11px;color:#555;">${site}</span>
        <span class="print-meta">${document.getElementById('weekLabel').textContent}</span>
      `;
      page.appendChild(hdr);

      // Grid wrapper
      const gridWrap = document.createElement('div');
      gridWrap.className = 'print-grid-wrap';

      const grid = document.createElement('div');
      grid.className = 'print-grid';

      // Time column
      const timeCol = document.createElement('div');
      timeCol.className = 'print-time-col';

      const timeHdr = document.createElement('div');
      timeHdr.className = 'print-time-hdr';
      timeHdr.textContent = 'TIME';
      timeCol.appendChild(timeHdr);

      for (let s = 0; s < numSlots; s++) {
        const t = minT + s * SLOT;
        const isHour = t % 60 === 0;
        const lbl = document.createElement('div');
        lbl.className = 'print-time-lbl';
        lbl.style.height = `${PX}px`;
        lbl.style.borderBottom = isHour ? '1px solid #ddd9d0' : t % 60 === 30 ? '1px dashed #e8e4dc' : 'none';
        if (isHour) lbl.textContent = fmtMin(t);
        timeCol.appendChild(lbl);
      }
      grid.appendChild(timeCol);

      // Room columns
      rooms.forEach(room => {
        const roomEvents = events.filter(e => e.facility === room);

        const col = document.createElement('div');
        col.className = 'print-room-col';

        const rHdr = document.createElement('div');
        rHdr.className = 'print-room-hdr';
        rHdr.textContent = room.replace(/^\(\w+\)\s*/, '').trim() || room;
        rHdr.title = room;
        col.appendChild(rHdr);

        const body = document.createElement('div');
        body.className = 'print-room-body';
        body.style.height = `${totalHeight}px`;

        // Background lines
        for (let s = 0; s < numSlots; s++) {
          const t = minT + s * SLOT;
          const isHour = t % 60 === 0;
          const isHalf = t % 60 === 30;
          const line = document.createElement('div');
          line.className = 'print-hour-line';
          line.style.top = `${s * PX}px`;
          line.style.height = `${PX}px`;
          line.style.background = s % 4 < 2 ? '#faf8f4' : '#f0ede6';
          if (isHour) line.style.borderTop = '1px solid #ddd9d0';
          else if (isHalf) line.style.borderTop = '1px dashed rgba(0,0,0,0.07)';
          body.appendChild(line);
        }

        // Events
        roomEvents.forEach(ev => {
          const evStart = parseTime(ev.from);
          const evEnd = parseTime(ev.to);
          if (evEnd <= minT || evStart >= maxT) return;

          const top = (evStart - minT) / SLOT * PX;
          const height = Math.max((evEnd - evStart) / SLOT * PX - 1, 10);
          const c = getColor(ev.item);
          const isClass = ev.type === 'CLASS';

          const block = document.createElement('div');
          block.className = 'print-event';
          block.style.top = `${top}px`;
          block.style.height = `${height}px`;
          block.style.background = c.bg;
          block.style.borderLeftColor = c.border;
          if (isClass) block.style.borderLeftWidth = '3px';

          const instrLast = ev.instructor?.split(',')[0] || '';
          block.innerHTML = `<div class="print-event-title">${ev.item}</div>` +
            (height >= 14 && instrLast ? `<div class="print-event-person">${instrLast}</div>` : '') +
            (height >= 22 && ev.student ? `<div class="print-event-person">${ev.student}</div>` : '');

          body.appendChild(block);
        });

        col.appendChild(body);
        grid.appendChild(col);
      });

      gridWrap.appendChild(grid);
      page.appendChild(gridWrap);

      // Mini legend at bottom
      const legend = document.createElement('div');
      legend.className = 'print-legend';
      legend.innerHTML = Object.entries(FAM_COLORS).map(([name, c]) =>
        `<div class="print-leg-item"><div class="print-leg-dot" style="background:${c.bg};border:1px solid ${c.border}"></div>${name}</div>`
      ).join('');
      page.appendChild(legend);

      section.appendChild(page);
    });
  });
}

document.getElementById('printBtn').addEventListener('click', () => {
  buildPrintSection();
  window.print();
});

  if (typeof SAMPLE_DATA !== 'undefined' && SAMPLE_DATA.length > 0) {
    loadData(SAMPLE_DATA);
  } else {

  }
